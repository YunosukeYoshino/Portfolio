name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [repository_dispatch]
permissions:
  contents: read

env:
  NODE_VERSION: "20"
  BUN_VERSION: "latest"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy to Cloudflare Workers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Prepare build env
        run: |
          cat > .env.local <<EOF
          MICROCMS_SERVICE_DOMAIN=${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY=${{ secrets.MICROCMS_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          VITE_SITE_URL=https://yunosukeyoshino.com
          VITE_PUBLIC_SITE_URL=https://yunosukeyoshino.com
          EOF

      - name: Build application
        run: bun run build
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SITE_URL: https://yunosukeyoshino.com

      - name: Sync worker secrets
        run: |
          cat > .worker-secrets.env <<EOF
          MICROCMS_SERVICE_DOMAIN=${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY=${{ secrets.MICROCMS_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          EOF
          bunx wrangler secret bulk .worker-secrets.env --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Verify deployed assets
        run: bun run verify:deployment https://yunosukeyoshino.com/

      - name: Create deployment status
        if: success()
        run: |
          echo "🚀 Deployment successful!"
          echo "📄 Site URL: https://yunosukeyoshino.com"
